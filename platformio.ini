; PlatformIO Project Configuration File
;
;   Upload o ptions: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other optio    ns and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; default_envs = T-Deck
default_envs = T-Deck-Plus
src_dir = t-rex-firmware

; ─────────────────────────────────────────
; Include paths — reorganised source tree
; Referenced via ${includes.build_flags} in each env
; ─────────────────────────────────────────
[includes]
build_flags =
    -I "${PROJECT_DIR}/t-rex-firmware/core/system"
    -I "${PROJECT_DIR}/t-rex-firmware/core/display"
    -I "${PROJECT_DIR}/t-rex-firmware/core/input"
    -I "${PROJECT_DIR}/t-rex-firmware/core/cli"
    -I "${PROJECT_DIR}/t-rex-firmware/ui/splash"
    -I "${PROJECT_DIR}/t-rex-firmware/ui/lockscreen"
    -I "${PROJECT_DIR}/t-rex-firmware/ui/notifications"
    -I "${PROJECT_DIR}/t-rex-firmware/ui/info"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/core"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/monitor/wifimon"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/monitor/netscanner"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/tools/sshcon"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/attacks/deauth"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/attacks/eviltwin"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/attacks/beacon_flood"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/attacks/hidden_ssid"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/attacks/karma"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/attacks/handshake"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/attacks/pmkid"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/attacks/mac_changer"
    -I "${PROJECT_DIR}/t-rex-firmware/wifi/defense/wguard"
    -I "${PROJECT_DIR}/t-rex-firmware/bluetooth/core"
    -I "${PROJECT_DIR}/t-rex-firmware/bluetooth/tools/ble_info"
    -I "${PROJECT_DIR}/t-rex-firmware/bluetooth/tools/trackme"
    -I "${PROJECT_DIR}/t-rex-firmware/bluetooth/tools/bmon"
    -I "${PROJECT_DIR}/t-rex-firmware/bluetooth/attacks/ble_spam"
    -I "${PROJECT_DIR}/t-rex-firmware/bluetooth/attacks/fast_pair"
    -I "${PROJECT_DIR}/t-rex-firmware/bluetooth/input/ble_keyboard"
    -I "${PROJECT_DIR}/t-rex-firmware/radio/espnow/espsniff"
    -I "${PROJECT_DIR}/t-rex-firmware/radio/espnow/esptest"
    -I "${PROJECT_DIR}/t-rex-firmware/radio/espnow/espchat"
    -I "${PROJECT_DIR}/t-rex-firmware/radio/espnow/espvoice"
    -I "${PROJECT_DIR}/t-rex-firmware/radio/lora"
    -I "${PROJECT_DIR}/t-rex-firmware/hardware/gps"
    -I "${PROJECT_DIR}/t-rex-firmware/hardware/sdcard"
    -I "${PROJECT_DIR}/t-rex-firmware/hardware/boards"
    -I "${PROJECT_DIR}/t-rex-firmware/usb/hid"
    -I "${PROJECT_DIR}/t-rex-firmware/usb/bad_usb"
    -I "${PROJECT_DIR}/t-rex-firmware/diagnostics/gps"
    -I "${PROJECT_DIR}/t-rex-firmware/diagnostics/speaker"
    -I "${PROJECT_DIR}/t-rex-firmware/diagnostics/i2cscan"
    -I "${PROJECT_DIR}/t-rex-firmware/diagnostics/mic"
    -I "${PROJECT_DIR}/t-rex-firmware/fun/buddy"

; ─────────────────────────────────────────
; Shared settings inherited by all envs
; ─────────────────────────────────────────
[env]
extra_scripts = pre:convert_splash.py

lib_deps =
    ; Display
    lovyan03/LovyanGFX @ ^1.1.16

    ; Network / Scanning
    marian-craciunescu/ESP32Ping @ ^1.7

    ; UI / Animation
    https://github.com/0015/TP_Arduino_DigitalRain_Anim

    ; Battery
    https://github.com/pangodream/18650CL

    ; Radio (LoRa)
    jgromes/RadioLib @ ^6.6.0

    ; Input
    bxparks/AceButton @ ^1.10.1
    https://github.com/mmMicky/TouchLib

    ; JSON
    bblanchon/ArduinoJson @ ^7.0.0

    ; GPS
    mikalhart/TinyGPSPlus @ ^1.0.3

    ; BLE — NimBLE replaces ESP32 BLE Arduino everywhere
    h2zero/NimBLE-Arduino @ ^2.5.0
    WiFi @ 2.0.0
    Wire @ 2.0.0

    ; SSH client (libssh port for ESP32) — used by sshcon/sc
    ewpa/LibSSH-ESP32 @ ^5.8.0


    ; ── Optional / future — uncomment to enable ─────────────────────────────
    ; https://github.com/moononournation/ArduinoVNC
    ; https://github.com/0015/ChatGPT_Client_For_Arduino
    ; https://github.com/moononournation/Arduino_GFX
    ; lvgl/lvgl
    ; https://github.com/schreibfaul1/ESP32-audioI2S  ; requires C++20 (-std=gnu++20 in build_flags)

; ─────────────────────────────────────────
; T-Keyboard env
; ─────────────────────────────────────────
[env:T-Keyboard]
platform = espressif32
board = ttgo-t-oi-plus
framework = arduino

; ─────────────────────────────────────────
; T-Deck (original)
; ─────────────────────────────────────────
[env:T-Deck]
platform = espressif32
board = esp32s3box
framework = arduino

upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = default_16MB.csv

build_unflags = -DARDUINO_USB_MODE=1

build_flags =
    ${includes.build_flags}
    -DBOARD_HAS_PSRAM
    ; -DBOARD_TDECK_PLUS=0
    -Wl,--allow-multiple-definition
    -DARDUINO_USB_MODE=0
    ; -DARDUINO_USB_CDC_ON_BOOT=1

; ─────────────────────────────────────────
; T-Deck Plus (built-in GPS, default target)
; ─────────────────────────────────────────
[env:T-Deck-Plus]
platform = espressif32
board = esp32s3box
framework = arduino

upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = default_16MB.csv

build_unflags = -DARDUINO_USB_MODE=1

build_flags =
    ${includes.build_flags}
    -DBOARD_HAS_PSRAM
    -DBOARD_TDECK_PLUS=1
    -Wl,--allow-multiple-definition
    -DARDUINO_USB_MODE=0
    ; -DARDUINO_USB_CDC_ON_BOOT=1
