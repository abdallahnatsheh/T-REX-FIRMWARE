; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = T-Deck
src_dir = t-deck-cli

; ─────────────────────────────────────────
; T-Keyboard env 
; ─────────────────────────────────────────
[env:T-Keyboard]
platform = espressif32
board = ttgo-t-oi-plus
framework = arduino

; ─────────────────────────────────────────
; T-Deck (main target)
; ─────────────────────────────────────────
[env:T-Deck]
platform = espressif32
board = esp32s3box
framework = arduino

upload_speed = 921600
monitor_speed = 115200
board_build.partitions = default_16MB.csv

build_flags =
    -DBOARD_HAS_PSRAM
    ; USB CDC ON BOOT — enables Serial over USB, device will wait for terminal on startup.
    ; Comment this out and uncomment the line below when running on battery (no USB).
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; -UARDUINO_USB_CDC_ON_BOOT

lib_deps =
    ; ── Auto-installed by PlatformIO on first build ─────────────────────────

    ; Display — T-Deck config: https://github.com/0015/ESP32Berry
    lovyan03/LovyanGFX @ ^1.1.16

    ; Network / Scanning
    marian-craciunescu/ESP32Ping @ ^1.7

    ; UI / Animation — not on registry, GitHub only
    https://github.com/0015/TP_Arduino_DigitalRain_Anim

    ; Battery — not on registry, GitHub only
    https://github.com/pangodream/18650CL

    ; Radio (LoRa — for upcoming LoRa features)
    jgromes/RadioLib @ ^6.6.0

    ; Input
    bxparks/AceButton @ ^1.10.1
    https://github.com/mmMicky/TouchLib   ; not on registry, GitHub only

    ; JSON (for future config / API features)
    bblanchon/ArduinoJson @ ^7.0.0

    ; Bluetooth — bundled with ESP32 Arduino core, no install needed
    ESP32 BLE Arduino @ 2.0.0
    WiFi @ 2.0.0
    Wire @ 2.0.0

    ; ── Optional / future — uncomment to enable ─────────────────────────────
    ; https://github.com/moononournation/ArduinoVNC
    ; https://github.com/0015/ChatGPT_Client_For_Arduino
    ; https://github.com/schreibfaul1/ESP32-audioI2S - not stable, causes build issues
    ; https://github.com/moononournation/Arduino_GFX
    ; lvgl/lvgl
