; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload o ptions: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other optio    ns and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = T-Deck-Plus
src_dir = t-deck-cli

; ─────────────────────────────────────────
; Shared settings inherited by all envs
; ─────────────────────────────────────────
[env]
extra_scripts = pre:convert_splash.py

lib_deps =
    ; Display
    lovyan03/LovyanGFX @ ^1.1.16

    ; Network / Scanning
    marian-craciunescu/ESP32Ping @ ^1.7

    ; UI / Animation
    https://github.com/0015/TP_Arduino_DigitalRain_Anim

    ; Battery
    https://github.com/pangodream/18650CL

    ; Radio (LoRa)
    jgromes/RadioLib @ ^6.6.0

    ; Input
    bxparks/AceButton @ ^1.10.1
    https://github.com/mmMicky/TouchLib

    ; JSON
    bblanchon/ArduinoJson @ ^7.0.0

    ; GPS
    mikalhart/TinyGPSPlus @ ^1.0.3

    ; BLE — NimBLE replaces ESP32 BLE Arduino everywhere
    h2zero/NimBLE-Arduino @ ^1.4.2
    WiFi @ 2.0.0
    Wire @ 2.0.0

    ; ── Optional / future — uncomment to enable ─────────────────────────────
    ; https://github.com/moononournation/ArduinoVNC
    ; https://github.com/0015/ChatGPT_Client_For_Arduino
    ; https://github.com/moononournation/Arduino_GFX
    ; lvgl/lvgl
    ; https://github.com/schreibfaul1/ESP32-audioI2S  ; requires C++20 (-std=gnu++20 in build_flags)

; ─────────────────────────────────────────
; T-Keyboard env
; ─────────────────────────────────────────
[env:T-Keyboard]
platform = espressif32
board = ttgo-t-oi-plus
framework = arduino

; ─────────────────────────────────────────
; T-Deck (original)
; ─────────────────────────────────────────
[env:T-Deck]
platform = espressif32
board = esp32s3box
framework = arduino

upload_speed = 921600
monitor_speed = 115200
board_build.partitions = default_16MB.csv

build_unflags = -DARDUINO_USB_MODE=1

build_flags =
    -DBOARD_HAS_PSRAM
    -DBOARD_TDECK_PLUS=1
    -Wl,--allow-multiple-definition
    -DARDUINO_USB_MODE=0
    ; -DARDUINO_USB_CDC_ON_BOOT=1
; ─────────────────────────────────────────
; T-Deck Plus (built-in GPS, default target)
; ─────────────────────────────────────────
[env:T-Deck-Plus]
platform = espressif32
board = esp32s3box
framework = arduino

upload_speed = 921600
monitor_speed = 115200
board_build.partitions = default_16MB.csv

build_unflags = -DARDUINO_USB_MODE=1

build_flags =
    -DBOARD_HAS_PSRAM
    -DBOARD_TDECK_PLUS=1
    -Wl,--allow-multiple-definition
    -DARDUINO_USB_MODE=0
    ; -DARDUINO_USB_CDC_ON_BOOT=1
